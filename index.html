<!DOCTYPE html>
<html>
<head>
  <title>Ebook Store</title>
  <style>
    body {
      background: black;
      color: white;
      font-family: Arial;
      padding: 20px;
      text-align: center;
    }

    .card {
      border: 1px solid gray;
      padding: 20px;
      border-radius: 10px;
      margin: auto;
      max-width: 400px;
    }

    button {
      padding: 10px 15px;
      background: green;
      color: white;
      border: none;
      margin-top: 10px;
      cursor: pointer;
    }

    .note {
      margin-top: 10px;
      color: lightgray;
      font-size: 14px;
    }

    .image-box {
      margin-top: 40px;
    }

    .image-box img {
      width: 90%;
      max-width: 400px;
      border-radius: 15px;
      box-shadow: 0 0 15px rgba(255,255,255,0.2);
    }
  </style>
</head>

<body>

<h1>Ebook Store</h1>

<div class="card">
  <h2>My First Ebook</h2>
  <p><b>Price: ₹399</b></p>
  <p>Pay via UPI: <b>rkhan@fam</b></p>

  <p class="note">
    After payment, click the button below and fill the form with your 
    <b>Transaction ID (UTR)</b>.
  </p>

  <a href="https://docs.google.com/forms/d/e/1FAIpQLScIbMKrYClSDv1ESQPWQ5mnpyNfj5iFzL2xIknaQO0mMV5SSw/viewform" target="_blank">
    <button>Submit Payment</button>
  </a>
</div>

<!-- YOUR IMAGE -->
<div class="image-box">
  <img src="https://i.ibb.co/zCXgsRV/IMG-20251121-182319-920.jpg">
</div>

</body>
</html>
