<!DOCTYPE html>
<html>
<head>
  <title>Ebook Store</title>
  <style>
    body {
      background: black;
      color: white;
      font-family: Arial;
      padding: 20px;
    }

    .card {
      border: 1px solid gray;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      max-width: 400px;
    }

    input {
      padding: 10px;
      margin-top: 10px;
      width: 100%;
    }

    button {
      padding: 10px 15px;
      background: green;
      color: white;
      border: none;
      margin-top: 10px;
      cursor: pointer;
    }

    .status {
      margin-top: 10px;
      color: lightgreen;
    }
  </style>
</head>

<body>

<h1>Ebook Store</h1>

<div class="card">
  <h2>My First Ebook</h2>
  <p><b>Price: ₹399</b></p>
  <p>Pay via UPI: <b>rkhan@fam</b></p>

  <p>
    After payment, enter your <b>Transaction ID (UTR)</b>.  
    You can find it in your UPI app (GPay, PhonePe, Paytm).
  </p>

  <input type="text" id="utr" placeholder="Enter Transaction ID (UTR)">

  <button onclick="submitPayment()">Submit Payment</button>

  <p id="status" class="status"></p>

  <button id="downloadBtn" style="display:none;" onclick="downloadEbook()">
    Download Ebook
  </button>
</div>

<script>
function submitPayment() {
  let utr = document.getElementById("utr").value;

  if (!utr) {
    alert("Please enter Transaction ID (UTR)");
    return;
  }

  localStorage.setItem("paymentStatus", "pending");

  document.getElementById("status").innerText =
    "Payment submitted! Waiting for approval...";
}

function downloadEbook() {
  alert("Ebook download will be added soon");
}

// Simulated approval (temporary)
if (localStorage.getItem("paymentStatus") === "approved") {
  document.getElementById("status").innerText = "Payment approved!";
  document.getElementById("downloadBtn").style.display = "block";
}
</script>

</body>
</html>
